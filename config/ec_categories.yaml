# Justin's EC categories (derived from config/justin_profile.json).
# Used by analyze_ecs.py to compute the alignment score per program.
# Keep in sync with the actual profile — update if Justin's ECs change.
justin_categories:
  - healthcare          # Misericordia shadowing, UofT MED YSP, Harvard MEDScience
  - stem_competitions   # IMC Merit, COMC, CyberPatriot, CCC, Kaggle, BIBO Silver, Pascal/Fryer/CIMC
  - research            # IB CS IA on mental health ML, Kaggle ML competitions
  - leadership          # HelpingMinds founder, Math & CS Club exec, Community Helpers exec
  - community_service   # Chatter 100+ hours, HelpingMinds awareness campaigns
  - arts_music          # Piano RCM Level 10
  - cs_technical        # CyberPatriot Linux, IB CS IA, Kaggle, LightGBM/XGBoost, Harvard AI robots
  - academic_awards     # IMC Merit, COMC Distinction, AP Bio 5, BIBO Silver
  # NOT matched: athletics (no sports mentioned), entrepreneurship (HelpingMinds is a non-profit, not a business)
