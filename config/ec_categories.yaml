# EC category definitions for keyword-based extraction.
# Used by tools/analyze_ecs.py to scan supp_app_notes, extracurriculars,
# and comments fields from the Reddit application data.
#
# Each category has:
#   key:      stable identifier used in ec_categories table and data.json
#   label:    display name
#   keywords: list of case-insensitive substring matches (not regex)
#   icon:     optional display hint for the dashboard (not used in extraction)
#
# Tuning: run analyze_ecs.py, check the per-program frequencies, and
# adjust keywords if a category is over/under-matching. The keywords
# are deliberately broad — false positives are preferable to false
# negatives since we're deriving directional insights, not precise counts.

categories:
  - key: healthcare
    label: Healthcare / Clinical
    keywords:
      - hospital
      - shadowing
      - clinic
      - patient
      - nurse
      - nursing
      - EMT
      - paramedic
