      30-1 projection of 85-90 has cushion but no margin for slipping.**

    oop_eligible: true
    oop_notes: |
      Open to all Canadian high school students. Reddit data (n=7 OOP) shows
      no clear OOP penalty: in-province mean accepted avg 96.2 vs OOP mean
      96.4. Queen's BHSc looks like Justin's most realistic Tier-1 BHSc
      target.

    application_fee_cad: 156

    notes: |
      Smaller and newer than McMaster's BHSc but increasingly competitive.
      The PSE (1 written + 1 video) is the differentiator. Reddit data shows
      median accepted avg 96.5%, very close to McMaster's 97.0. The 80%
      English floor and the "no late submissions" rule are the two
      compliance gates Justin needs to clear absolutely.

  - program_key: waterloo_cs
    tier: 1
    source_url: https://uwaterloo.ca/future-students/programs/computer-science
