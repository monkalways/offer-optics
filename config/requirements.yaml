      Waterloo's own published competitive average for CS.

    application_deadline_ouac: 2026-01-30        # Waterloo's general (non-Eng) deadline
    application_deadline_supp: 2026-02-13        # AIF deadline — same as general document deadline
    document_deadline: 2026-02-13
    decision_release_window: "Mid May (with a deferral round before final decisions)"

    supp_app_required: true
    supp_app_type: "Admission Information Form (AIF)"
    supp_app_url: https://uwaterloo.ca/future-students/admissions/admission-information-form
    supp_app_notes: |
      The AIF asks about academic background, extracurriculars, programming
      experience, contests, and reasons for choosing Waterloo CS. It is a
      required part of the application — the program page states
      "supplementary information forms, including the Admission Information
      Form, are required for admission." Reddit comments frequently cite
      hackathon wins, CS contest results (CCC, Euclid, AMC), and
      community/competitive programming as common AIF entries.

    casper_required: false
    casper_format: null
    interview_required: false
    interview_format: null
    references_required: false
    references_count: null

    min_average_competitive: 95.0   # "individual selection from the low to mid-90s" — interpreted as ~95
    prereq_courses:
      - "Grade 12 English 4U (any)"
      - "Grade 12 Advanced Functions (MHF4U)"
      - "Grade 12 Calculus & Vectors (MCV4U)"
      - "One additional Grade 12 4U/4M course"
    prereq_notes: |
      Recommended: Grade 11 Introduction to Computer Science (ICS3U). For
      Alberta students, Math 30-1 maps to Advanced Functions and Math 31
      (Calculus) maps to Calculus & Vectors — Justin satisfies both at very
      strong levels (99/99). His weakest spot is ELA 30-1 at 87.5 midpoint;
      Waterloo doesn't impose an explicit English minimum like Queen's does,
      but a higher English mark would help his top-6 average.

    oop_eligible: true
    oop_notes: |
      Open to all. Reddit data (n=12 OOP) shows accepted-average distribution
      similar to in-province; the OOP penalty looks small compared to
      McMaster BHSc. However, Waterloo CS overall is the toughest Tier-1
      program by raw GPA — median accepted avg 97.5% in the Reddit dataset,
      and the YoY trend is rising sharply (+3.6 points from 23-24 to 24-25).

    application_fee_cad: 156

    notes: |
      The most numerically competitive of Justin's Tier-1 targets. Cutoffs
      have tightened sharply in the last two cycles. The AIF can move a
      borderline applicant up — strong CS contest results and hackathon work
      are well-regarded. Waterloo CS commonly defers borderline applicants
      to a second decision round in late May rather than rejecting outright.

