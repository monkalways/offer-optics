# Curated application requirements per program for Justin's 2026-2027 cycle.
# (Justin applies in fall 2026 for fall 2027 entry.)
#
# This is the source of truth — committed, hand-edited, and loaded into the
# SQLite `requirements` table by tools/load_requirements.py. The companion
# tools/fetch_requirements_pages.py captures HTML snapshots in .tmp/requirements/
# for provenance.
#
# Schema (see workflows/build_requirements_checklist.md for the full spec):
#   program_key                 — must match a program in config/programs.yaml
#   tier                        — copied from programs.yaml for convenience
#   source_url                  — the page each fact came from
#   curated_on                  — ISO date of last curation pass
#   confidence                  — high | medium | low | needs_verification
#   curator_notes               — anything the curator wants future-self to know
#
#   Dates are ISO YYYY-MM-DD. They reference the 2025-2026 (last published)
#   cycle as a template; OUAC dates almost never shift more than ±1 day year
#   over year, so Justin's 2026-2027 dates will fall on the same calendar dates
#   ±1. Mark `dates_cycle_template` so the dashboard can flag this.
#
#   Use null (not omitted) when a field is genuinely unknown, so the dashboard
#   can display "—" rather than silently dropping the field.

dates_cycle_template: "2025-2026"
dates_note: |
  The dates below are from the most recent published cycle (2025-2026, i.e.
  fall-2025 application for fall-2026 entry). Justin's actual cycle is 2026-2027
  (fall-2026 application for fall-2027 entry); his dates will fall on the same
  calendar dates ±1 day. Re-curate these once each program publishes its 2026-2027
  dates (typically August-October 2026).

requirements:

  # ───────────────────── Tier 1 — Top targets ─────────────────────

  - program_key: mcmaster_bhsc
    tier: 1
    source_url: https://bhsc.mcmaster.ca/future-students/admissions/
    fallback_source_url: https://hhsp.healthsci.mcmaster.ca/
    curated_on: 2026-04-08
    confidence: medium
    curator_notes: |
      McMaster's bhsc.mcmaster.ca and hhsp.healthsci.mcmaster.ca are both
      Cloudflare-protected and refused our automated fetches (403). These
      values come from public knowledge of the program plus the Reddit dataset.
      All fields should be re-verified by manually opening the official page.
      The bhsc.mcmaster.ca subdomain 301-redirects to hhsp.healthsci.mcmaster.ca
      as of April 2026 — the Honours Health Sciences Program (HHSP) is the
      program's current home.

    application_deadline_ouac: 2026-01-15        # OUAC equal-consideration; Jan 15 is the universal Ontario UG date
    application_deadline_supp: 2026-02-01        # supplementary app deadline; commonly Feb 1 (verify)
    document_deadline: 2026-02-01
    decision_release_window: "Two waves: early March and early May (first week of each)"

    supp_app_required: true
    supp_app_type: "Written supplementary application (reflective essay-style questions)"
    supp_app_url: https://hhsp.healthsci.mcmaster.ca/future-students/supplementary-application/
    supp_app_notes: |
      Opens in September. Applicants receive submission instructions via email
      in January. Reflective questions covering experiences, motivations, and
      values. Must be completed independently — sharing or posting answers
      online disqualifies the application. The supp app is the primary
      differentiator above the ~90% grade floor.

    casper_required: false
    casper_format: null
    interview_required: false
    interview_format: null
    references_required: false
    references_count: null

    min_average_competitive: 90.0
    prereq_courses:
      - "Grade 12 English (ENG4U) — required"
      - "5 best Grade 12 4U/4M courses including the required English"
      - "Grade 12 Biology (SBI4U) — strongly recommended"
      - "Grade 12 Chemistry (SCH4U) — strongly recommended"
    prereq_notes: |
      English 4U is the only formally required prerequisite; Bio + Chem are
      recommended. Justin's Alberta equivalents are ELA 30-1, Biology 30,
      Chemistry 30 — all satisfied. McMaster will use his top-6 Grade 12
      academic average for assessment.

    oop_eligible: true
    oop_notes: |
      Open to all Canadian high school students, including 105 / Group B
      applicants from Alberta. **However, the Reddit dataset shows zero OOP
      acceptances below 97.8% across 4 cycles (n=5 OOP reports).** Justin at
      ~95.5% is below this observed floor. Take this as a strong signal that
      the OOP supplementary application bar at McMaster BHSc is meaningfully
      higher than the in-province bar.

    application_fee_cad: 156   # OUAC base fee for 3 program choices; supp app fee not included

    notes: |
      One of the most competitive direct-entry undergraduate programs in
      Canada. The supplementary application + interview-style reflective
      writing is the dominant signal — Reddit data shows the accepted vs
      rejected averages at McMaster BHSc differ by only ~0.8 points in 24-25.
      Justin can compensate for the OOP gap with an exceptional supp app, but
      the bar is realistically a reach.

